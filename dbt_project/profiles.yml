crypto_analytics:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('DBT_HOST', 'localhost') }}"
      port: "{{ env_var('DBT_PORT', '5433') | int }}"
      user: "{{ env_var('DBT_USER', 'crypto_user') }}"
      password: "{{ env_var('DBT_PASSWORD', 'crypto_pass') }}"
      dbname: "{{ env_var('DBT_DBNAME', 'crypto_db') }}"
      schema: analytics
      threads: 4
      connect_timeout: 10